<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
  <title>Admin Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {background: #f5f5f5; color: #222; }
    nav {
      background: #2e7d32;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
    }
    nav h1 { 
        color: white; 
        font-size: 1.4rem; 
    }
    .container { 
        max-width: 900px; 
        margin: 2rem auto; 
        padding: 0 2rem; 
    }
    .add-form {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .add-form h3 { 
        margin-bottom: 1rem; 
        font-size: 1rem; 
    }
    .add-form input {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 0.5rem 0.8rem;
      font-size: 0.9rem;
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
      width: 180px;
    }
    .add-form button {
      background: #2e7d32;
      color: white;
      border: none;
      padding: 0.5rem 1.2rem;
      font-size: 0.9rem;
    }
    .add-form button:hover { 
        background: #1b5e20; 
    }
    h2 { margin-bottom: 1rem; 
        font-size: 1.2rem; 
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
    thead { 
        background: #2e7d32; 
        color: white; 
    }
    th, td { 
        padding: 0.7rem 1rem; 
        text-align: left; 
        font-size: 0.9rem; 
    }
    tbody tr { 
        border-bottom: 1px solid #eee;
    }
    .delete-btn {
      background: #c62828;
      color: white;
      border: none;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .delete-btn:hover { 
        background: #b71c1c; 
    }
    .empty { 
        color: #999; 
        font-size: 0.9rem; }
  </style>
</head>
<body>

<nav>
  <h1>Admin Dashboard</h1>
</nav>

<div class="container">
  <div class="section active" id="tab-products">
    <form class="add-form" method="post">
      <h3>Add New Product</h3>
      <input type="text" id="newName" placeholder="Product name">
      <input type="number" id="newPrice" placeholder="Price" step="0.01">
      <input type="text" id="newEmoji" placeholder="Emoji (e.g. 🍎)">
      <button onclick="addProduct()">Add</button>
    </div>

    <h2>All Products</h2>
    <table>
      <thead>
        <tr><th>Emoji</th><th>Name</th><th>Price</th><th>Delete</th></tr>
      </thead>
      <tbody id="productTable">
      </tbody>
    </table>
  </div>
</div>

<script>
  var products = []
 
  function loadProducts() {
    fetch("/products")
      .then(function(response) { return response.json() })
      .then(function(data) {
        products = data
        renderProducts()
      })
  }
 
  function renderProducts() {
    var tbody = document.getElementById("productTable")
    if (products.length === 0) {
      tbody.innerHTML = "<tr><td colspan='4'>No products yet.</td></tr>"
      return
    }
    var html = ""
    for (var i = 0; i < products.length; i++) {
      html += "<tr>"
      html += "<td>" + products[i].emoji + "</td>"
      html += "<td>" + products[i].name + "</td>"
      html += "<td>$" + Number(products[i].price).toFixed(2) + "</td>"
      html += "<td><button class='delete-btn' onclick=\"deleteProduct('" + products[i].name + "')\">Delete</button></td>"
      html += "</tr>"
    }
    tbody.innerHTML = html
  }
 
  function addProduct() {
    var name = document.getElementById("newName").value.trim()
    var price = document.getElementById("newPrice").value.trim()
    var emoji = document.getElementById("newEmoji").value.trim()
    if (!name || !price || !emoji) {
      alert("Please fill in all fields.")
      return
    }
    fetch("/products/add", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name, price: price, emoji: emoji })
    })
    .then(function(response) { return response.json() })
    .then(function(data) {
      products = data
      renderProducts()
      document.getElementById("newName").value = ""
      document.getElementById("newPrice").value = ""
      document.getElementById("newEmoji").value = ""
    })
  }
 
  function deleteProduct(name) {
    fetch("/products/delete", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name })
    })
    .then(function(response) { return response.json() })
    .then(function(data) {
      products = data
      renderProducts()
    })
  }
 
  loadProducts()
</script>
 
</body>
</html>
